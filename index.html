<input id="q" placeholder="Enter goal">
<button onclick="send()">Ask</button>

<script>
async function send() {
  const q = document.getElementById("q").value;
  const res = await fetch(`https://your-app.onrender.com/ask?q=${q}`, {
    method: "POST"
  });
  const data = await res.json();
  alert(data.response);
}
</script>
