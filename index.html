<!DOCTYPE html>
<html>
<head>
  <title>AI Task Planner</title>
</head>
<body>
  <h2>AI Task Planner</h2>

  <input id="q" placeholder="Enter your goal" style="width:300px;" />
  <button onclick="send()">Ask</button>

  <pre id="output"></pre>

  <script>
    async function send() {
      const q = document.getElementById("q").value;

      const res = await fetch(
        `https://ai-agent-q16p.onrender.com/ask?q=${encodeURIComponent(q)}`,
        { method: "POST" }
      );

      const data = await res.json();
      document.getElementById("output").innerText = data.response;
    }
  </script>
</body>
</html>
